<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="auth.css">
    <script src="/theme.js" defer></script>
    <script src="auth.js" defer></script>
</head>

<body class="preload">
    <main>
        <div class="card active login section">
            <h2>Login</h2>
            <form>
                <input id="email" type="email" placeholder="Email" required>
                <input id="password" type="password" placeholder="Password" required>
                <label for="remember">
                    <input type="checkbox" id="remember"> Remember me
                </label>
                <button type="submit">Login</button>
            </form>
            <div>
                <label for="signup">Don't have an account?</label>
                <a id="signup" href="#signup" style="white-space: nowrap;">Sign up</a>
            </div>
            <p class="error"></p>
        </div>

        <div class="card signup section">
            <h2>Sign Up</h2>
            <form>
                <input id="email" type="email" placeholder="Email" required>
                <input id="password" type="password" placeholder="Password" required>
                <button type="submit">Sign Up</button>
            </form>
            <div>
                <label for="signin">Already have an account?</label>
                <a id="signin" href="#login" style="white-space: nowrap;">Sign in</a>
            </div>
            <p class="error">Account already exists with that email!</p>
        </div>

        <button class="skip">SKIP AUTHENTICATION</button>
    </main>
</body>

</html>
