<!DOCTYPE html>
<html lang="en">

<!-- 
    Author: Benjamin DeBiase
    Date: 04/19/26
    Profile management page
--->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Dashboard - Profile</title>
    <link rel="icon" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <script src="theme.js" defer></script>
    <script src="dashboard.js" defer></script>
</head>

<body>
    <header>
        <h2>
            <img src="icons/graduation-cap.png" class="site-icon">Academic Dashboard</image>
        </h2>
        <a href="" class="account-icon"><img src="icons/circle-user-solid.png" class="icon"></a>
    </header>

    <main>
        <div class="dropdown">
            <h4>Signed in as</h4>
            <div class="account-name">user</div>
            <a href="" class="logout"><img src="icons/right-from-bracket-solid.png" class="icon">Log out</a>
        </div>

        <aside>
            <nav class="normal">
                <a href="index.html"><img src="icons/house-solid.png" class="icon">Overview</a>
                <a href="settings.html"><img src="icons/gear-solid.png" class="icon">Settings</a>
                <a href="profile.html" class="active"><img src="icons/user-solid.png" class="icon">Profile</a>
                <div class="spacer"></div>
                <a href="about.html"><img src="icons/circle-info-solid.png" class="icon">About</a>
            </nav>

            <nav class="compact">
                <a href="index.html"><img src="icons/house-solid.png" class="icon"></a>
                <a href="settings.html"><img src="icons/gear-solid.png" class="icon"></a>
                <a href="profile.html" class="active"><img src="icons/user-solid.png" class="icon"></a>
                <div class="spacer"></div>
                <a href="about.html"><img src="icons/circle-info-solid.png" class="icon"></a>
            </nav>
        </aside>

        <div class="content">
            <h1>Profile</h1>

            <section>
                <h3>
                    <img src="icons/user-solid.png" class="icon">Account
                </h3>

                <hr />

                <form id="profile-form">
                    <div class="item">
                        <label for="change-email">Change Email:</label>
                        <input type="email" id="change-email" placeholder="New email" required>
                    </div>
                    <div class="item">
                        <label for="change-password">Change Password:</label>
                        <input type="password" id="change-password" placeholder="New password" required>
                    </div>
                    <div id="apply-account-button" style="margin-top: 1rem; text-align: right;">
                        <button type="submit">Apply</button>
                    </div>
                </form>
            </section>

            <section>
                <h3>
                    <img src="icons/clock-rotate-left-solid.png" class="icon">Logs
                </h3>
                <hr />
                <ol>
                    <li>Logged in from Windows PC using Chrome - Today at 10:45 AM</li>
                    <li>Updated account email address - Yesterday at 2:30 PM</li>
                    <li>Logged in from iPhone using Safari - April 15th at 8:15 AM</li>
                </ol>
            </section>
        </div>
    </main>

    <script>
        const changeEmailInput = document.getElementById('change-email');
        const changePasswordInput = document.getElementById('change-password');
        const profileForm = document.getElementById('profile-form');

        // handle profile form submission to change email and password in local storage
        profileForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const currentUser = localStorage.getItem('currentUser');
            const currentAccounts = JSON.parse(localStorage.getItem('accounts')) || [];
            const accountIndex = currentAccounts.findIndex(acc => acc.email === currentUser);

            // if there is an account found with an index, modify it in place
            if (accountIndex !== -1) {
                currentAccounts[accountIndex].email = changeEmailInput.value || currentAccounts[accountIndex].email;
                currentAccounts[accountIndex].password = changePasswordInput.value || currentAccounts[accountIndex].password;

                localStorage.setItem('accounts', JSON.stringify(currentAccounts));
                localStorage.setItem('currentUser', currentAccounts[accountIndex].email);

                window.location.reload();
            }
        });
    </script>
</body>

</html>
